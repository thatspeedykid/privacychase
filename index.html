<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon – PrivacyChase</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --accent: #00ff99;
      --accent2: #00c8ff;
      --text: #e8e8e8;
      --muted: #555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,153,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,153,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridDrift 20s linear infinite;
      z-index: 0;
    }

    @keyframes gridDrift {
      from { transform: translateY(0); }
      to   { transform: translateY(40px); }
    }

    /* Radial glow */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(0,255,153,0.07) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 700px;
    }

    .badge {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(0,255,153,0.3);
      padding: 0.35em 1em;
      border-radius: 2px;
      margin-bottom: 2rem;
      animation: fadeUp 0.6s ease both;
    }

    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 18vw, 11rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .subline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 6vw, 3.5rem);
      letter-spacing: 0.12em;
      color: var(--accent2);
      margin-top: 0.2em;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      margin: 2rem auto;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .description {
      font-size: 0.85rem;
      line-height: 1.8;
      color: #999;
      letter-spacing: 0.05em;
      max-width: 420px;
      margin: 0 auto 2.5rem;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    .notify-wrap {
      display: flex;
      gap: 0;
      max-width: 380px;
      margin: 0 auto;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    .notify-wrap input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-right: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      padding: 0.75em 1em;
      outline: none;
      transition: border-color 0.2s;
    }

    .notify-wrap input::placeholder { color: var(--muted); }
    .notify-wrap input:focus { border-color: var(--accent); }

    .notify-wrap button {
      background: var(--accent);
      color: #000;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.75em 1.25em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .notify-wrap button:hover { background: #00ffb3; }
    .notify-wrap button:active { transform: scale(0.97); }

    .status-row {
      margin-top: 3rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
      animation: fadeUp 0.6s 0.6s ease both;
    }

    .status-item {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.5em;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">🔒 Privacy First</div>
    <div class="headline">Coming</div>
    <div class="subline">Soon</div>
    <div class="divider"></div>
    <p class="description">
      PrivacyChase is almost ready.<br>
      Something big is being built — stay in the loop.
    </p>
    <div class="notify-wrap">
      <input type="email" placeholder="your@email.com">
      <button>Notify Me</button>
    </div>
    <div class="status-row">
      <span class="status-item"><span class="dot"></span> In Development</span>
      <span class="status-item">· Est. 2025</span>
      <span class="status-item">· thatspeedykid</span>
    </div>
  </div>
</body>
</html>
